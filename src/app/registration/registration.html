<div class="form-container">

  <div class="form-card">
    <h2>Student Registration</h2>

    <form (ngSubmit)="register()">

      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="student.name" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="student.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="student.password" name="password" required>
      </div>

      <button type="submit">Register</button>

    </form>
  </div>

</div>
<p class="link">
  Already registered?
  <a routerLink="/">Login here</a>
</p>
